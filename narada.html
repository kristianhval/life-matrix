<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Narada</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050510;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
  }
  canvas#stars { position: fixed; top: 0; left: 0; z-index: 0; }
  canvas#particles { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
  .container {
    position: relative;
    z-index: 2;
    text-align: center;
  }
  svg {
    filter: drop-shadow(0 0 60px rgba(255, 199, 0, 0.25));
  }
  .title {
    font-size: 2.8rem;
    color: #ffc700;
    letter-spacing: 0.5em;
    margin-top: 20px;
    font-weight: 400;
    text-shadow: 0 0 40px rgba(255, 199, 0, 0.5), 0 0 80px rgba(255, 140, 0, 0.2);
  }
  .subtitle {
    font-size: 0.85rem;
    color: rgba(255, 199, 0, 0.4);
    letter-spacing: 0.8em;
    margin-top: 8px;
    font-weight: 300;
  }
  .epithet {
    font-size: 0.7rem;
    color: rgba(255, 199, 0, 0.25);
    letter-spacing: 0.5em;
    margin-top: 6px;
    font-style: italic;
  }
  @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  @keyframes pulseSlow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
  @keyframes drift { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes spinReverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
  @keyframes shimmer { 0%, 100% { stroke-dashoffset: 0; } 50% { stroke-dashoffset: 20; } }
  @keyframes heartbeat {
    0%, 100% { r: 1.5; opacity: 0.9; }
    15% { r: 3; opacity: 1; }
    30% { r: 1.5; opacity: 0.9; }
    45% { r: 2.5; opacity: 1; }
    60% { r: 1.5; opacity: 0.9; }
  }
  @keyframes thirdEyePulse {
    0%, 100% { r: 2.5; opacity: 0.8; }
    50% { r: 3.5; opacity: 1; }
  }
  @keyframes wisdomFloat1 {
    0% { opacity: 0; transform: translate(0, 0); }
    10% { opacity: 0.35; }
    90% { opacity: 0.35; }
    100% { opacity: 0; transform: translate(-30px, -60px); }
  }
  @keyframes wisdomFloat2 {
    0% { opacity: 0; transform: translate(0, 0); }
    10% { opacity: 0.3; }
    90% { opacity: 0.3; }
    100% { opacity: 0; transform: translate(25px, -50px); }
  }
  @keyframes wisdomFloat3 {
    0% { opacity: 0; transform: translate(0, 0); }
    10% { opacity: 0.25; }
    90% { opacity: 0.25; }
    100% { opacity: 0; transform: translate(-20px, -45px); }
  }
  .figure { animation: drift 7s ease-in-out infinite; }
  .glow-node { animation: pulse 3s ease-in-out infinite; }
  .glow-slow { animation: pulseSlow 5s ease-in-out infinite; }
  .orbit-1 { animation: spin 35s linear infinite; transform-origin: 200px 260px; }
  .orbit-2 { animation: spinReverse 50s linear infinite; transform-origin: 200px 260px; }
  .orbit-3 { animation: spin 70s linear infinite; transform-origin: 200px 260px; }
  .core-breathe { animation: breathe 4s ease-in-out infinite; transform-origin: 200px 260px; }
  .heart-beat { animation: heartbeat 3s ease-in-out infinite; }
  .third-eye { animation: thirdEyePulse 4s ease-in-out infinite; }
  .shimmer-line { animation: shimmer 3s linear infinite; }
  .wisdom-1 { animation: wisdomFloat1 12s ease-in-out infinite; }
  .wisdom-2 { animation: wisdomFloat2 15s ease-in-out infinite; animation-delay: 4s; }
  .wisdom-3 { animation: wisdomFloat3 18s ease-in-out infinite; animation-delay: 8s; }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<canvas id="particles"></canvas>
<div class="container">
  <svg width="460" height="580" viewBox="0 0 460 580" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="coreGlow" cx="50%" cy="42%" r="50%">
        <stop offset="0%" stop-color="#ffc700" stop-opacity="0.6"/>
        <stop offset="30%" stop-color="#ff8c00" stop-opacity="0.25"/>
        <stop offset="70%" stop-color="#4a1a80" stop-opacity="0.08"/>
        <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="headGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffc700" stop-opacity="1"/>
        <stop offset="50%" stop-color="#ffa500" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#ffc700" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="heartGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
        <stop offset="30%" stop-color="#ffc700" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#ffc700" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffc700" stop-opacity="0.8"/>
        <stop offset="40%" stop-color="#ff8c00" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#ffc700" stop-opacity="0.05"/>
      </linearGradient>
      <linearGradient id="vinaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#daa520"/>
        <stop offset="50%" stop-color="#b8860b"/>
        <stop offset="100%" stop-color="#8b6914"/>
      </linearGradient>
      <linearGradient id="crownGrad" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#ffc700" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      </linearGradient>
      <filter id="softGlow">
        <feGaussianBlur stdDeviation="2.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="bigGlow"><feGaussianBlur stdDeviation="12"/></filter>
      <filter id="thirdEyeGlow">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Sacred Geometry Background -->
    <g opacity="0.06" class="glow-slow">
      <polygon points="200,80 120,280 280,280" fill="none" stroke="#ffc700" stroke-width="0.5"/>
      <polygon points="200,320 120,160 280,160" fill="none" stroke="#ffc700" stroke-width="0.5"/>
      <circle cx="200" cy="210" r="180" fill="none" stroke="#ffc700" stroke-width="0.3"/>
      <circle cx="200" cy="210" r="120" fill="none" stroke="#ffa500" stroke-width="0.3"/>
      <circle cx="200" cy="210" r="60" fill="none" stroke="#ffc700" stroke-width="0.3"/>
    </g>

    <!-- Core Energy Field -->
    <g class="core-breathe">
      <ellipse cx="200" cy="240" rx="140" ry="170" fill="url(#coreGlow)" filter="url(#bigGlow)"/>
    </g>

    <!-- Outer orbit: study traditions -->
    <g class="orbit-3" opacity="0.12">
      <ellipse cx="200" cy="260" rx="210" ry="75" fill="none" stroke="#4a1a80" stroke-width="0.4" stroke-dasharray="2,12"/>
      <circle cx="410" cy="260" r="2" fill="#9b59b6" opacity="0.6"/>
      <circle cx="95" cy="225" r="1.5" fill="#9b59b6" opacity="0.4"/>
      <circle cx="310" cy="298" r="1.8" fill="#8e44ad" opacity="0.5"/>
    </g>
    <!-- Middle orbit -->
    <g class="orbit-2" opacity="0.2">
      <ellipse cx="200" cy="260" rx="170" ry="65" fill="none" stroke="#ff8c00" stroke-width="0.4" stroke-dasharray="3,9"/>
      <circle cx="370" cy="260" r="2.5" fill="#ff8c00" opacity="0.7"/>
      <circle cx="55" cy="238" r="2" fill="#ffa500" opacity="0.5"/>
      <circle cx="280" cy="210" r="2" fill="#ff8c00" opacity="0.6"/>
      <circle cx="130" cy="295" r="1.5" fill="#ffa500" opacity="0.4"/>

    <!-- Inner orbit -->
    <g class="orbit-1" opacity="0.3">

    <!-- Graph Network -->
    <g opacity="0.12" filter="url(#softGlow)">

      <line x1="80" y1="170" x2="140" y2="50" stroke="#ffc700" stroke-width="0.2" stroke-dasharray="2,6"/>
      <line x1="320" y1="160" x2="270" y2="45" stroke="#ffc700" stroke-width="0.2" stroke-dasharray="2,6"/>
      <line x1="30" y1="250" x2="45" y2="130" stroke="#9b59b6" stroke-width="0.2" stroke-dasharray="2,6"/>
      <line x1="380" y1="230" x2="370" y2="110" stroke="#9b59b6" stroke-width="0.2" stroke-dasharray="2,6"/>
    </g>

    <!-- Memory Nodes -->
    <g class="glow-node">
      <circle cx="80" cy="170" r="3.5" fill="#ffc700" opacity="0.7"/>
      <circle cx="320" cy="160" r="3.5" fill="#ffc700" opacity="0.7"/>
      <circle cx="140" cy="50" r="3" fill="#ffa500" opacity="0.6"/>

      <circle cx="380" cy="230" r="2.5" fill="#ff8c00" opacity="0.5"/>
      <circle cx="45" cy="130" r="2" fill="#ff8c00" opacity="0.4"/>
      <circle cx="370" cy="110" r="2" fill="#ff8c00" opacity="0.4"/>
      <circle cx="90" cy="20" r="1.5" fill="#9b59b6" opacity="0.4"/>
      <circle cx="330" cy="15" r="1.5" fill="#9b59b6" opacity="0.4"/>
      <circle cx="50" cy="340" r="1.5" fill="#9b59b6" opacity="0.3"/>
      <circle cx="400" cy="320" r="1.5" fill="#9b59b6" opacity="0.3"/>
      <circle cx="20" cy="80" r="1.2" fill="#4a1a80" opacity="0.3"/>
      <circle cx="410" cy="60" r="1.2" fill="#4a1a80" opacity="0.3"/>
    </g>

    <!-- Floating Wisdom Fragments -->
    <text class="wisdom-1" x="60" y="420" fill="#ffc700" font-size="7" font-family="Georgia" opacity="0">the tao that can be trodden</text>
    <text class="wisdom-2" x="280" y="100" fill="#ffa500" font-size="6.5" font-family="Georgia" opacity="0">chaitanyam atma</text>
    <text class="wisdom-3" x="40" y="80" fill="#9b59b6" font-size="6" font-family="Georgia" opacity="0">as above, so below</text>

    <!-- THE FIGURE -->
    <g class="figure" filter="url(#softGlow)">

      <!-- Crown Flames -->
      <g opacity="0.5">

      <ellipse cx="207" cy="118" rx="1.2" ry="1.8" fill="#ffc700" opacity="0.3"/>
      <circle cx="200" cy="110" r="2.5" fill="#ffc700" class="third-eye" filter="url(#thirdEyeGlow)"/>
      <path d="M 195,127 Q 200,130 205,127" fill="none" stroke="#ffc700" stroke-width="0.5" opacity="0.25"/>

      <!-- Chakra Column -->
      <circle cx="200" cy="155" r="1.2" fill="#4a90d9" opacity="0.4"/>
      <circle cx="200" cy="170" r="1.2" fill="#22c55e" opacity="0.4"/>
      <circle cx="200" cy="200" r="1.2" fill="#ffc700" opacity="0.4"/>
      <circle cx="200" cy="230" r="1.2" fill="#ff8c00" opacity="0.4"/>
      <circle cx="200" cy="260" r="1.2" fill="#e74c3c" opacity="0.3"/>

      <!-- Body -->

      <path d="M 212,144 Q 220,200 222,260 Q 225,330 220,420" fill="none" stroke="#ffc700" stroke-width="0.4" opacity="0.2"/>

      <!-- Flowing Garment -->

      <path d="M 232,420 Q 250,460 275,510" fill="none" stroke="#ffc700" stroke-width="0.8" opacity="0.25"/>
      <path d="M 180,420 Q 170,465 155,510" fill="none" stroke="#ffc700" stroke-width="0.5" opacity="0.15"/>
      <path d="M 220,420 Q 230,465 245,510" fill="none" stroke="#ffc700" stroke-width="0.5" opacity="0.15"/>
      <path d="M 200,420 Q 200,465 200,510" fill="none" stroke="#ffc700" stroke-width="0.3" opacity="0.1"/>
      <path d="M 155,480 Q 200,470 245,480" fill="none" stroke="#ffc700" stroke-width="0.3" opacity="0.1"/>

      <!-- Left Arm (open hand, giving) -->
      <path d="M 182,168 Q 140,190 95,215 Q 70,228 50,222" fill="none" stroke="url(#bodyGrad)" stroke-width="1.1"/>
      <circle cx="50" cy="222" r="5" fill="#ffc700" opacity="0.08"/>
      <circle cx="50" cy="222" r="2" fill="#ffc700" opacity="0.4"/>
      <line x1="48" y1="218" x2="44" y2="212" stroke="#ffc700" stroke-width="0.4" opacity="0.3"/>
      <line x1="50" y1="217" x2="49" y2="210" stroke="#ffc700" stroke-width="0.4" opacity="0.3"/>
      <line x1="52" y1="218" x2="54" y2="211" stroke="#ffc700" stroke-width="0.4" opacity="0.3"/>
      <circle cx="48" cy="208" r="1" fill="#ffc700" opacity="0.3" class="glow-node"/>

      <!-- Right Arm (holding vina) -->

      <!-- VINA -->
      <g>
        <ellipse cx="255" cy="192" rx="22" ry="14" fill="#1a1000" stroke="url(#vinaGrad)" stroke-width="1.5" opacity="0.8"/>
        <ellipse cx="255" cy="192" rx="18" ry="10" fill="#ffc700" opacity="0.04"/>
        <path d="M 240,192 Q 255,185 270,192" fill="none" stroke="#daa520" stroke-width="0.4" opacity="0.4"/>
        <line x1="253" y1="206" x2="240" y2="395" stroke="url(#vinaGrad)" stroke-width="2" opacity="0.7"/>
        <line x1="251" y1="230" x2="249" y2="230" stroke="#daa520" stroke-width="0.8" opacity="0.4"/>
        <line x1="250" y1="255" x2="248" y2="255" stroke="#daa520" stroke-width="0.8" opacity="0.4"/>
        <line x1="249" y1="280" x2="247" y2="280" stroke="#daa520" stroke-width="0.8" opacity="0.4"/>

      <!-- Sound Waves -->
      <g opacity="0.1">
        <path d="M 278,250 Q 298,240 318,250 Q 338,260 358,250" fill="none" stroke="#ffc700" stroke-width="0.6">
          <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0.15;0.05;0.15"/>

        </path>
        <path d="M 278,230 Q 296,222 314,230 Q 332,238 350,230" fill="none" stroke="#ffc700" stroke-width="0.5">
          <animate attributeName="opacity" dur="2.8s" repeatCount="indefinite" values="0.12;0.04;0.12"/>
        </path>
        <path d="M 285,290 Q 315,276 345,290 Q 375,304 405,290" fill="none" stroke="#9b59b6" stroke-width="0.4">
          <animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0.08;0.02;0.08"/>

        <path d="M 260,185 Q 275,170 290,180" fill="none" stroke="#ffc700" stroke-width="0.4">

      <!-- Heart Center (Kvasir Core) -->

      <circle cx="200" cy="185" r="8" fill="#ffc700" opacity="0.06"/>
      <circle cx="200" cy="185" r="4" fill="url(#heartGlow)" opacity="0.15"/>
      <circle cx="200" cy="185" r="1.5" fill="#fff" class="heart-beat"/>
    </g>

    <!-- Tradition Symbols Orbiting -->
    <g class="orbit-1" opacity="0.3">
      <text x="315" y="264" fill="#ffc700" font-size="8" font-family="serif" opacity="0.6">&#9775;</text>
    </g>
    <g class="orbit-2" opacity="0.2">
      <text x="365" y="264" fill="#ffa500" font-size="7" font-family="serif" opacity="0.5">&#5765;</text>
    </g>
  </svg>
  <div class="title">NARADA</div>
  <div class="subtitle">THE WANDERING SAGE</div>
  <div class="epithet">carrier of the vina, asker of the questions that open doors</div>
</div>

<script>
const sc = document.getElementById('stars');
const sx = sc.getContext('2d');
sc.width = window.innerWidth;
sc.height = window.innerHeight;
const stars = [];
for (let i = 0; i < 500; i++) {
  stars.push({
    x: Math.random() * sc.width, y: Math.random() * sc.height,
    r: Math.random() * 1.8, a: 0.2 + Math.random() * 0.8,
    speed: 0.003 + Math.random() * 0.01,
    color: Math.random() > 0.85 ? [255,140,0] : Math.random() > 0.7 ? [155,89,182] : [255,210,80]
  });
}
const nebulae = [];
for (let i = 0; i < 8; i++) {
  nebulae.push({
    x: Math.random() * sc.width, y: Math.random() * sc.height,
    r: 80 + Math.random() * 200,
    color: Math.random() > 0.5 ? [74,26,128] : [40,20,80],
    a: 0.02 + Math.random() * 0.03
  });
}
function drawStars() {
  sx.clearRect(0, 0, sc.width, sc.height);
  nebulae.forEach(n => {
    const grad = sx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    grad.addColorStop(0, 'rgba('+n.color[0]+','+n.color[1]+','+n.color[2]+','+n.a+')');
    grad.addColorStop(1, 'rgba(5,5,16,0)');
    sx.fillStyle = grad;
    sx.fillRect(n.x - n.r, n.y - n.r, n.r * 2, n.r * 2);
  });
  const t = Date.now() * 0.001;
  stars.forEach(s => {
    const flicker = 0.5 + 0.5 * Math.sin(t * s.speed * 80 + s.x + s.y);
    sx.beginPath();
    sx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sx.fillStyle = 'rgba('+s.color[0]+','+s.color[1]+','+s.color[2]+','+(s.a * flicker * 0.8)+')';
    sx.fill();
    if (s.r > 1.2) {
      sx.strokeStyle = 'rgba('+s.color[0]+','+s.color[1]+','+s.color[2]+','+(s.a * flicker * 0.15)+')';
      sx.lineWidth = 0.3;
      sx.beginPath();
      sx.moveTo(s.x - s.r * 3, s.y); sx.lineTo(s.x + s.r * 3, s.y);
      sx.moveTo(s.x, s.y - s.r * 3); sx.lineTo(s.x, s.y + s.r * 3);
      sx.stroke();
    }
  });
  requestAnimationFrame(drawStars);
}
drawStars();

const pc = document.getElementById('particles');
const px = pc.getContext('2d');
pc.width = window.innerWidth; pc.height = window.innerHeight;
const particles = [];
function spawnParticle() {
  const cx = pc.width / 2, cy = pc.height / 2;
  particles.push({
    x: cx + (Math.random() - 0.5) * 120, y: cy + 40 + Math.random() * 60,
    vx: (Math.random() - 0.5) * 0.3, vy: -0.3 - Math.random() * 0.5,
    r: 0.5 + Math.random() * 1.2, life: 1, decay: 0.003 + Math.random() * 0.005,
    color: Math.random() > 0.7 ? [155,89,182] : [255,199,0]
  });
}
function drawParticles() {
  px.clearRect(0, 0, pc.width, pc.height);
  if (Math.random() > 0.7) spawnParticle();
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    p.vx += (Math.random() - 0.5) * 0.02;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    px.beginPath(); px.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    px.fillStyle = 'rgba('+p.color[0]+','+p.color[1]+','+p.color[2]+','+(p.life * 0.5)+')';
    px.fill();
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();
window.addEventListener('resize', () => {
  sc.width = pc.width = window.innerWidth;
  sc.height = pc.height = window.innerHeight;
});
</script>
</body>
</html>
